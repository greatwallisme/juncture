# Juncture Telemetry Stack
#
# Provides a local observability pipeline for testing Juncture's
# OpenTelemetry integration end-to-end.
#
# Services:
#   - otel-collector: receives OTLP (gRPC :4317, HTTP :4318), exports to Jaeger + Prometheus
#   - jaeger: trace storage and UI (:16686)
#   - prometheus: metrics storage and UI (:9090)
#
# Usage:
#   docker compose up -d          # start stack
#   docker compose down           # stop stack
#   docker compose logs -f        # follow all logs

services:
  # --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: juncture-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus exporter (scraped by Prometheus)
    depends_on:
      - jaeger

  # --- Jaeger (traces) ---
  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    container_name: juncture-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC (not used directly, Collector handles OTLP)

  # --- Prometheus (metrics) ---
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: juncture-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI
    depends_on:
      - otel-collector
